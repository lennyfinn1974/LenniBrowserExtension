<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lenni</title>
  <link rel="stylesheet" href="../styles/common.css">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo">L</div>
        <span class="title">Lenni</span>
      </div>
      <div class="header-right">
        <span id="status-dot" class="status-dot disconnected" title="Disconnected"></span>
        <button id="btn-page-context" class="icon-btn" title="Include page context">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        </button>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages" class="messages">
      <div class="empty-state">
        <div class="empty-icon">L</div>
        <p>Ask me anything about this page, or chat freely.</p>
        <p class="hint">Right-click text to analyse it.</p>
      </div>
    </div>

    <!-- Thinking indicator -->
    <div id="thinking" class="thinking hidden">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span id="thinking-text">Lenni is thinking...</span>
    </div>

    <!-- Input -->
    <div id="input-area" class="input-area">
      <textarea id="input" rows="1" placeholder="Ask Lenni anything..." autofocus></textarea>
      <button id="btn-send" class="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
